<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Login | CESOMS</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body class="auth-body">
    <div class="ambient ambient-a"></div>
    <div class="ambient ambient-b"></div>
    <div class="ambient ambient-c"></div>

    <main class="auth-shell">
      <section class="auth-card">
        <p class="eyebrow">Campus Event &amp; Student Organization Management System</p>
        <h1>Student Login</h1>
        <p class="auth-copy">
          Sign in with your Student ID and school email to view your personal event sign-ups.
        </p>

        {% if error %}
        <p class="auth-error">{{ error }}</p>
        {% endif %}

        <form method="POST" class="auth-form">
          <label class="field">
            <span>Student ID</span>
            <input
              type="text"
              name="student_id"
              autocomplete="username"
              placeholder="STU-101"
              value="{{ form_values.student_id }}"
              required
            />
          </label>

          <label class="field">
            <span>Email</span>
            <input
              type="email"
              name="email"
              autocomplete="email"
              placeholder="student@school.edu"
              value="{{ form_values.email }}"
              required
            />
          </label>

          <button type="submit" class="button-solid">Sign In</button>
        </form>

        <p class="auth-note">
          Want the full schema demo? <a href="{{ url_for('dashboard_page') }}">Open dashboard view</a>.
        </p>
      </section>
    </main>
  </body>
</html>
